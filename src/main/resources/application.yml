spring:
  application:
    name: java-api-apm-sample

  # MySQL / Aurora MySQL データソース設定
  datasource:
    # ローカル: docker-compose で起動した MySQL を指す（環境変数で上書き可）
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/sampledb?serverTimezone=UTC&characterEncoding=UTF-8&connectTimeout=10000&socketTimeout=30000&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:appuser}
    password: ${MYSQL_PASSWORD:apppassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      # update: テーブルが存在しない場合は作成し、既存テーブルは変更しない。
      # ローカルは docker-entrypoint-initdb.d で作成済みのため no-op。
      # RDS（初回デプロイ時）はテーブルが存在しないため Hibernate が自動作成する。
      ddl-auto: update
    open-in-view: false  # LazyInitializationException を明示的に防ぐため false を推奨

  # OpenFeign クライアントごとのタイムアウト設定
  cloud:
    openfeign:
      client:
        config:
          # "ipify" は @FeignClient(name = "ipify") と対応するクライアント名
          ipify:
            connect-timeout: 3000  # 接続タイムアウト (ms)
            read-timeout: 5000     # 読み取りタイムアウト (ms)

# アプリケーション固有の設定
app:
  # 稼働環境名。ECS タスク定義の環境変数 APP_ENV で上書きされる（例: prod）
  env: ${APP_ENV:local}

# AWS 設定
aws:
  region: ${AWS_REGION:ap-northeast-1}
  dynamodb:
    table-name: ${DYNAMODB_USERS_TABLE:users}
    # DynamoDB Local のエンドポイント URL。本番（ECS）では空のままにする。
    # ローカル開発: export DYNAMODB_ENDPOINT_URL=http://localhost:8000
    endpoint-url: ${DYNAMODB_ENDPOINT_URL:}

# 外部 HTTP API 設定
external:
  ipify:
    # ipify のベース URL。@FeignClient の url に注入される。
    url: ${IPIFY_URL:https://api.ipify.org}