AWSTemplateFormatVersion: '2010-09-09'
Description: ECR repository stack.

Parameters:
  ProjectName:
    Type: String
    Default: java-apm-sample

Resources:

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        # 古いイメージを自動削除してストレージコストを抑える
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  ECRRepositoryUri:
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub ${ProjectName}-ecr-uri

  ECRRepositoryName:
    Value: !Ref ECRRepository
    Export:
      Name: !Sub ${ProjectName}-ecr-name
