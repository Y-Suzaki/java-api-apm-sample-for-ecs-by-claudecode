AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS Fargate Service stack for user-company-api.
  Imports Exports from 06-shared-cluster-lb.yaml (ECS Cluster / ALB / NLB / SG) and
  from the DynamoDB / RDS stacks. The NLB itself is shared, but this stack creates
  a Listener (port 80) and target group dedicated to this app.
  Also imports the ApiInvokeUrl Export of 08-apigw-log-api-internal.yaml (LOG_API_URL
  env var) - that stack must therefore be deployed before this one on first deploy.

Parameters:
  ProjectName:
    Type: String
    Default: java-apm-sample
  ImageUri:
    Type: String
    Description: >
      ECR image URI with tag. e.g. 123456789.dkr.ecr.ap-northeast-1.amazonaws.com/java-apm-sample-user-company-api:abc1234
  UsersTableName:
    Type: String
    Default: users
    Description: DynamoDB table name injected as env var DYNAMODB_USERS_TABLE
  MySqlUsername:
    Type: String
    Default: appuser
    Description: RDS MySQL master username
  DesiredCount:
    Type: Number
    Default: 1
    Description: Number of ECS tasks

Resources:

  # ── IAM Role ─────────────────────────────────────────────────────────────
  # TaskRole: コンテナ内アプリと CloudWatch Agent サイドカーが使用する権限
  # - DynamoDB CRUD: アプリコンテナが users テーブルにアクセスするための権限
  # - AWSXRayDaemonWriteAccess: CloudWatch Agent が X-Ray にトレースを送信するための権限
  # - CloudWatchAgentServerPolicy: CloudWatch Agent が Application Signals メトリクスを送信するための権限
  #   （サイドカーもタスクロールを共有する）
  # - SecretsManagerReadMySqlSecret: アプリが起動時に spring-cloud-aws-starter-secrets-manager 経由で
  #   RDS 管理シークレット（マスターパスワード）を読み取るための権限
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-user-company-api-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: DynamoDBCRUD
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-users-table-arn
        - PolicyName: SecretsManagerReadMySqlSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-rds-master-secret-arn

  # ── CloudWatch Logs ──────────────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}
      RetentionInDays: 30

  # ── X-Ray Sampling Rule ──────────────────────────────────────────────────
  # /health エンドポイントを X-Ray トレースから除外する。
  # ALB ヘルスチェックのスパンがトレースに大量に記録されるのを防ぐ。
  # FixedRate: 0 / ReservoirSize: 0 でサンプリング率ゼロ（記録しない）。
  # Priority: 1 = デフォルトルール（10000）より先に評価される。
  # Application Signals のメトリクスはトレースサンプリングとは独立しているため影響なし。
  HealthCheckSamplingRule:
    Type: AWS::XRay::SamplingRule
    Properties:
      SamplingRule:
        RuleName: !Sub ${ProjectName}-exclude-health
        Priority: 1
        ReservoirSize: 0
        FixedRate: 0
        Host: "*"
        HTTPMethod: GET
        ServiceName: !Sub ${ProjectName}-api
        ServiceType: "*"
        URLPath: /health
        ResourceARN: "*"
        Version: 1

  # サービス全体のサンプリングルール（/health 除外後の全パスを明示的にカバー）。
  # Priority: 2 = /health 除外ルール（1）の次に評価される。
  # Default ルール（10000）へのフォールスルーに依存せず、サービス固有ルールで明示的に 5% サンプリングする。
  # これにより ADOT v2 + Application Signals のフォールスルー問題を回避する。
  ServiceSamplingRule:
    Type: AWS::XRay::SamplingRule
    Properties:
      SamplingRule:
        RuleName: !Sub ${ProjectName}-sample-all
        Priority: 2
        ReservoirSize: 1
        FixedRate: 0.05
        Host: "*"
        HTTPMethod: "*"
        ServiceName: !Sub ${ProjectName}-api
        ServiceType: "*"
        URLPath: "*"
        ResourceARN: "*"
        Version: 1

  # ── ECS Task Definition ──────────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-user-company-api-task
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      # CloudWatch Agent サイドカー分を含めて 512/1024（サイドカーが常駐 ~50MiB 消費するため）
      Cpu: 512
      Memory: 1024
      ExecutionRoleArn: !ImportValue
        Fn::Sub: ${ProjectName}-task-execution-role-arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:

        # ----- アプリケーションコンテナ -----
        - Name: !Sub ${ProjectName}-user-company-api-container
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: APP_ENV
              Value: prod
            # spring-cloud-aws-starter-secrets-manager による RDS 管理シークレットの読み込みは
            # application-prod.yml（spring.config.activate.on-profile: prod）でのみ有効化する
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DYNAMODB_USERS_TABLE
              Value: !Ref UsersTableName
            # DYNAMODB_ENDPOINT_URL は本番では未設定（デフォルトのリージョンエンドポイントを使用）

            # ----- log-api への内部ログ送信（08-apigw-log-api-internal.yaml の Private API Gateway 経由） -----
            - Name: LOG_API_URL
              Value: !ImportValue
                Fn::Sub: ${ProjectName}-log-api-internal-invoke-url

            # ----- MySQL（Company API）接続設定 -----
            - Name: MYSQL_URL
              Value: !Sub
                - "jdbc:mysql://${RdsEndpoint}:3306/${DbName}?serverTimezone=UTC&characterEncoding=UTF-8&connectTimeout=10000&socketTimeout=30000&allowPublicKeyRetrieval=true&useSSL=false"
                - RdsEndpoint: !ImportValue
                    Fn::Sub: ${ProjectName}-rds-endpoint
                  DbName: !ImportValue
                    Fn::Sub: ${ProjectName}-rds-db-name
            - Name: MYSQL_USER
              Value: !Ref MySqlUsername
            # MYSQL_PASSWORD は環境変数に平文で渡さず、RDS 管理シークレットの ARN のみを渡す。
            # アプリが起動時に spring-cloud-aws-starter-secrets-manager 経由でパスワードを取得する。
            - Name: MYSQL_SECRET_ARN
              Value: !ImportValue
                Fn::Sub: ${ProjectName}-rds-master-secret-arn

            # ----- ADOT Java Agent / Application Signals 設定 -----
            # OTLP/HTTP で CloudWatch Agent サイドカー（localhost:4316）に送信する。
            # awsvpc モードのため同一タスク内は localhost で通信できる。
            - Name: OTEL_EXPORTER_OTLP_PROTOCOL
              Value: http/protobuf
            - Name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              Value: http://localhost:4316/v1/traces
            - Name: OTEL_AWS_APPLICATION_SIGNALS_ENABLED
              Value: "true"
            - Name: OTEL_AWS_APPLICATION_SIGNALS_EXPORTER_ENDPOINT
              Value: http://localhost:4316/v1/metrics
            # Application Signals 経由でメトリクスを送るため OTLP の metrics/logs 直送は無効化する
            - Name: OTEL_METRICS_EXPORTER
              Value: none
            - Name: OTEL_LOGS_EXPORTER
              Value: none
            # X-Ray Central Sampling（CloudWatch Agent が UDP/2000 でサンプリングプロキシとして動作）
            - Name: OTEL_TRACES_SAMPLER
              Value: xray
            - Name: OTEL_TRACES_SAMPLER_ARG
              Value: endpoint=http://localhost:2000
            # X-Ray トレース ID 互換のプロパゲーター（Application Signals 推奨構成）
            - Name: OTEL_PROPAGATORS
              Value: tracecontext,baggage,b3,xray
            - Name: OTEL_SERVICE_NAME
              Value: !Sub ${ProjectName}-api
            - Name: OTEL_RESOURCE_ATTRIBUTES
              Value: !Sub deployment.environment=prod,service.namespace=${ProjectName}
          # サイドカー（otel-collector）が起動してからアプリを起動させる。
          # 起動直後のスパン送信で接続失敗ログが出るのを防ぐ。
          DependsOn:
            - ContainerName: otel-collector
              Condition: START
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

        # ----- CloudWatch Agent サイドカー（Application Signals 用） -----
        # ECS タスク内で OTLP を 4315/4316 で受信し、AWS Application Signals
        # （X-Ray トレース + CloudWatch メトリクス）にエクスポートする。
        # X-Ray Central Sampling の UDP プロキシ（:2000）も本コンテナが担う。
        # X-Ray / CloudWatch への送信権限は TaskRole から付与する。
        - Name: otel-collector
          Image: public.ecr.aws/cloudwatch-agent/cloudwatch-agent:latest
          Essential: true
          Environment:
            - Name: CW_CONFIG_CONTENT
              Value: |
                {
                  "traces": {
                    "traces_collected": {
                      "application_signals": {}
                    }
                  },
                  "logs": {
                    "metrics_collected": {
                      "application_signals": {}
                    }
                  }
                }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: cwagent

  # ── NLB ターゲットグループ + Listener（このアプリ専用。ポート 80） ─────────
  # NLB のターゲットグループはヘルスチェックタイムアウトをカスタマイズできない
  # （interval 30s の場合は固定 10s）ため HealthCheckTimeoutSeconds は指定しない。
  # Name は明示指定しない（CloudFormation が自動生成する）。
  # TargetGroup の Name は 32 文字制限があり、${ProjectName}-user-company-api-... は
  # 容易に超過するため、論理 ID から一意な名前を自動生成させる。
  NlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Protocol: TCP
      Port: 8080
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-id
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  NLBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !ImportValue
        Fn::Sub: ${ProjectName}-nlb-arn
      Protocol: TCP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref NlbTargetGroup

  # ── ALB → NLB 転送用ターゲットグループ + ListenerRule（このアプリ専用） ────
  # ALB のターゲットグループには NLB を直接指定する仕組み（"nlb" ターゲットタイプ）が
  # 存在しないため、NLB の各 AZ ノードに割り当てた固定プライベート IP を静的ターゲットとして
  # 登録し、ALB → NLB（ポート 80、このアプリの NLBListener）への転送を実現する。
  # Name は明示指定しない（CloudFormation が自動生成する。理由は NlbTargetGroup と同じ）。
  AlbToNlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Protocol: HTTP
      Port: 80
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-id
      TargetType: ip
      Targets:
        - Id: !ImportValue
            Fn::Sub: ${ProjectName}-nlb-private-ip-1a
          Port: 80
        - Id: !ImportValue
            Fn::Sub: ${ProjectName}-nlb-private-ip-1c
          Port: 80
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # /health, /configuration → NLB 経由で ECS へ転送
  ALBListenerRuleGeneral:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !ImportValue
        Fn::Sub: ${ProjectName}-alb-listener-arn
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - /health
            - /configuration
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AlbToNlbTargetGroup

  # /users, /users/* → NLB 経由で ECS へ転送
  ALBListenerRuleUsers:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !ImportValue
        Fn::Sub: ${ProjectName}-alb-listener-arn
      Priority: 2
      Conditions:
        - Field: path-pattern
          Values:
            - /users
            - /users/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AlbToNlbTargetGroup

  # /companies, /companies/* → NLB 経由で ECS へ転送（/companies/*/subsidiaries もこのパターンに含まれる）
  ALBListenerRuleCompanies:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !ImportValue
        Fn::Sub: ${ProjectName}-alb-listener-arn
      Priority: 3
      Conditions:
        - Field: path-pattern
          Values:
            - /companies
            - /companies/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AlbToNlbTargetGroup

  # ── ECS Service ──────────────────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: NLBListener
    Properties:
      ServiceName: !Sub ${ProjectName}-user-company-api-service
      Cluster: !ImportValue
        Fn::Sub: ${ProjectName}-ecs-cluster-name
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      # 旧タスクを先に停止してから新タスクを起動する（ローリングアップデートによる無限ループを防ぐ）
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
      # Spring Boot 起動に ~50 秒かかるため ALB ヘルスチェック失敗を 180 秒間無視する。
      # 未設定（デフォルト 0）だと起動中に 3 回連続失敗してタスクが停止されループする。
      HealthCheckGracePeriodSeconds: 180
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: ${ProjectName}-private-subnet-1a-id
            - !ImportValue
              Fn::Sub: ${ProjectName}-private-subnet-1c-id
          SecurityGroups:
            - !ImportValue
              Fn::Sub: ${ProjectName}-ecs-sg-id
      LoadBalancers:
        - ContainerName: !Sub ${ProjectName}-user-company-api-container
          ContainerPort: 8080
          TargetGroupArn: !Ref NlbTargetGroup

Outputs:
  ECSServiceName:
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub ${ProjectName}-user-company-api-ecs-service-name