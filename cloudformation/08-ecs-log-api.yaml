AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS Fargate Service stack for log-api (a minimal sample API that accepts arbitrary
  logs and prints them to stdout). Imports Exports from 06-shared-cluster-lb.yaml
  (ECS Cluster / ALB / NLB / SG). APM (ADOT/X-Ray) is intentionally not included,
  since this app exists as a minimal sample of application separation.
  The NLB itself is shared, but this stack adds a Listener dedicated to this app on
  port 8081 (user-company-api already uses port 80, so each app gets its own NLB
  listener port to keep traffic separated).

Parameters:
  ProjectName:
    Type: String
    Default: java-apm-sample
  ImageUri:
    Type: String
    Description: >
      ECR image URI with tag. e.g. 123456789.dkr.ecr.ap-northeast-1.amazonaws.com/java-apm-sample-log-api:abc1234
  DesiredCount:
    Type: Number
    Default: 1
    Description: Number of ECS tasks

Resources:

  # ── CloudWatch Logs ──────────────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}-log-api
      RetentionInDays: 30

  # ── ECS Task Definition ──────────────────────────────────────────────────
  # AWS API を呼び出さない（DynamoDB/RDS/Secrets Manager 等への依存なし）ため TaskRole は付与しない。
  # サイドカーなしの最小構成。
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-log-api-task
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: 256
      Memory: 512
      ExecutionRoleArn: !ImportValue
        Fn::Sub: ${ProjectName}-task-execution-role-arn
      ContainerDefinitions:
        - Name: !Sub ${ProjectName}-log-api-container
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: APP_ENV
              Value: prod
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

  # ── NLB ターゲットグループ + Listener（このアプリ専用。ポート 8081） ───────
  # Name は明示指定しない（CloudFormation が自動生成する）。
  # TargetGroup の Name は 32 文字制限があり、${ProjectName}-log-api-... は
  # ProjectName 次第で容易に超過するため、論理 ID から一意な名前を自動生成させる。
  NlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Protocol: TCP
      Port: 8080
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-id
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  NLBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !ImportValue
        Fn::Sub: ${ProjectName}-nlb-arn
      Protocol: TCP
      Port: 8081
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref NlbTargetGroup

  # ── ALB → NLB 転送用ターゲットグループ + ListenerRule（このアプリ専用） ────
  # NLB の固定プライベート IP のポート 8081（このアプリの NLBListener）宛に転送する。
  # Name は明示指定しない（CloudFormation が自動生成する。理由は NlbTargetGroup と同じ）。
  AlbToNlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Protocol: HTTP
      Port: 8081
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-id
      TargetType: ip
      Targets:
        - Id: !ImportValue
            Fn::Sub: ${ProjectName}-nlb-private-ip-1a
          Port: 8081
        - Id: !ImportValue
            Fn::Sub: ${ProjectName}-nlb-private-ip-1c
          Port: 8081
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # /logs, /logs/* → NLB(:8081) 経由でこのアプリの ECS へ転送
  ALBListenerRuleLogs:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !ImportValue
        Fn::Sub: ${ProjectName}-alb-listener-arn
      Priority: 4
      Conditions:
        - Field: path-pattern
          Values:
            - /logs
            - /logs/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AlbToNlbTargetGroup

  # ── ECS Service ──────────────────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: NLBListener
    Properties:
      ServiceName: !Sub ${ProjectName}-log-api-service
      Cluster: !ImportValue
        Fn::Sub: ${ProjectName}-ecs-cluster-name
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
      # Spring Boot 起動時間を見込んで ALB ヘルスチェック失敗を一定時間無視する。
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: ${ProjectName}-private-subnet-1a-id
            - !ImportValue
              Fn::Sub: ${ProjectName}-private-subnet-1c-id
          SecurityGroups:
            - !ImportValue
              Fn::Sub: ${ProjectName}-ecs-sg-id
      LoadBalancers:
        - ContainerName: !Sub ${ProjectName}-log-api-container
          ContainerPort: 8080
          TargetGroupArn: !Ref NlbTargetGroup

Outputs:
  ECSServiceName:
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub ${ProjectName}-log-api-ecs-service-name