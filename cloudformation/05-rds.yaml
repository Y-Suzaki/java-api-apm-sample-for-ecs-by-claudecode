AWSTemplateFormatVersion: '2010-09-09'
Description: >
  RDS MySQL 8.4 stack for Company API.
  Single-AZ, minimum-cost configuration for testing.
  Imports VPC/subnet IDs from network stack.

Parameters:
  ProjectName:
    Type: String
    Default: java-apm-sample
  DBName:
    Type: String
    Default: sampledb
  DBUsername:
    Type: String
    Default: appuser
  DBPassword:
    Type: String
    NoEcho: true
    Description: Master password for RDS MySQL instance.
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: Minimum-cost instance for testing.
  EngineVersion:
    Type: String
    Default: "8.4.8"
    Description: RDS MySQL engine version (8.4.x LTS).

Resources:

  # ── Security Group ───────────────────────────────────────────────────────
  # ECS タスク（Private Subnet）からのアクセスを許可する。
  # VPC CIDR 全体を許可して ECS SG との循環依存（04↔05）を回避する。
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-rds-sg
      GroupDescription: Allow MySQL from within VPC
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.20.0.0/16

  # ── DB Subnet Group ──────────────────────────────────────────────────────
  # RDS は 2AZ にサブネットが必要。Private Subnet 1a / 1c を利用する。
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub ${ProjectName}-db-subnet-group
      DBSubnetGroupDescription: Private subnets for RDS MySQL
      SubnetIds:
        - !ImportValue
          Fn::Sub: ${ProjectName}-private-subnet-1a-id
        - !ImportValue
          Fn::Sub: ${ProjectName}-private-subnet-1c-id

  # ── RDS MySQL Instance ───────────────────────────────────────────────────
  # テスト用コスト最小構成:
  #   - db.t3.micro / Single-AZ / 20GB gp3
  #   - BackupRetentionPeriod: 0（自動バックアップ無効）
  #   - DeletionProtection: false（delete-all.sh で削除可能にする）
  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-mysql
      DBName: !Ref DBName
      Engine: mysql
      EngineVersion: !Ref EngineVersion
      DBInstanceClass: !Ref DBInstanceClass
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: "20"
      StorageType: gp3
      MultiAZ: false
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 0
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-mysql

Outputs:
  DBEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub ${ProjectName}-rds-endpoint

  DBName:
    Value: !Ref DBName
    Export:
      Name: !Sub ${ProjectName}-rds-db-name

  DBUsername:
    Value: !Ref DBUsername
    Export:
      Name: !Sub ${ProjectName}-rds-username