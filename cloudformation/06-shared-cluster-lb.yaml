AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Shared ECS Cluster + ALB + internal NLB stack, shared by all application-specific
  ECS service stacks (07-ecs-log-api.yaml, 09-ecs-user-company-api.yaml, ...) and the
  API Gateway stacks fronting them (08-apigw-log-api-internal.yaml, ...).
  Imports VPC/subnet IDs from the network stack.
  Traffic path (user-company-api): Internet -> ALB (Public) -> NLB (Application, internal)
  -> ECS (Private).
  Traffic path (log-api): Internet -> API Gateway (REST API) -> VPC Link -> NLB
  (Application, internal) -> ECS (Private). log-api does not go through the ALB.
  Since NLB is L4 and cannot do path-based routing, each app gets its own NLB
  listener port to keep traffic separated (the NLB Listener itself is added by
  each app's ECS stack, not here).
  Also owns an S3 bucket for OpenAPI spec staging and the ALB's mTLS CA bundle.
  ALB mTLS is opt-in via AlbCertificateArn (see ALBListener; empty by default).

Parameters:
  ProjectName:
    Type: String
    Default: java-apm-sample
  NlbPrivateIp1a:
    Type: String
    Default: 10.20.32.10
    Description: >
      Static private IP for the internal NLB node in Application Subnet 1a.
      Must be within ApplicationSubnet1a CIDR (10.20.32.0/20). Each app's ALB target
      group registers this IP directly since ALB target groups have no native "nlb"
      target type.
  NlbPrivateIp1c:
    Type: String
    Default: 10.20.48.10
    Description: >
      Static private IP for the internal NLB node in Application Subnet 1c.
      Must be within ApplicationSubnet1c CIDR (10.20.48.0/20).
  AlbCertificateArn:
    Type: String
    Default: ''
    Description: >
      ACM certificate ARN for the ALB HTTPS listener (self-signed server cert imported
      via scripts/deploy-mtls.sh). Empty (default) keeps the ALB on plain HTTP:80 with
      no mTLS, which is required for the very first deploy since the ALB DNS name
      (used as the server cert CN) doesn't exist yet. Once set, ALBListener switches to
      HTTPS:443 with mTLS (Verify mode against ALBTrustStore) and an HTTP->HTTPS
      redirect listener is added.

Conditions:
  HasAlbCertificate: !Not [!Equals [!Ref AlbCertificateArn, '']]

Resources:

  # ── Security Groups ──────────────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-alb-sg
      GroupDescription: >-
        Allow HTTP from anywhere to ALB (plain, or the HTTPS redirect once mTLS is
        enabled); HTTPS (443) is only opened once AlbCertificateArn is set
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - !If
          - HasAlbCertificate
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            CidrIp: 0.0.0.0/0
          - !Ref AWS::NoValue

  NLBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-nlb-sg
      GroupDescription: Allow port 80 from ALB only (internal NLB, no internet access)
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-id
      SecurityGroupIngress:
        # user-company-api の NLB Listener ポート（ALB 経由）
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        # log-api の NLB Listener ポート（API Gateway REST API の VPC Link 経由）。
        # PrivateLink（VPC Endpoint Service）経由で NLB に届くトラフィックは、送信元 IP が
        # 呼び出し元（API Gateway）側の VPC のアドレスに変換されるため、こちら側の VPC CIDR
        # では絞り込めない（実測: 10.20.0.0/16 指定では接続がサイレントにドロップされ、
        # API Gateway 側で 500 "internal error" になることを確認済み）。NLB は internal
        # スキームで IGW ルートを持たないため、0.0.0.0/0 にしてもインターネットから到達可能に
        # なるわけではない（プライベート IP への経路が存在しない）ため、これで許可する。
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          CidrIp: 0.0.0.0/0

  # 全アプリ共通の ECS タスク SG。全アプリのコンテナポートが 8080 で統一されているため共有する。
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-ecs-sg
      GroupDescription: Allow port 8080 from NLB only (shared by all app ECS services)
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref NLBSecurityGroup

  # ── S3 Bucket（OpenAPI 仕様書のステージング用） ─────────────────────────────
  # API Gateway REST API の Body（OpenAPI 定義）は Fn::Transform (AWS::Include) で
  # S3 上のファイルを読み込む。各アプリの openapi.yaml はデプロイスクリプトが
  # `aws s3 cp` でここへアップロードしてから CloudFormation デプロイを実行する。
  # 全アプリ共有だが、現時点で使用するのは log-api のみ。
  OpenApiArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-openapi-${AWS::AccountId}

  # ── IAM Role ─────────────────────────────────────────────────────────────
  # TaskExecutionRole: ECS エージェントが ECR からイメージを pull し、CloudWatch Logs に書き込むための権限。
  # アプリ固有の業務権限を含まない汎用ロールのため、全アプリで共有する。
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ── ECS Cluster（全アプリ共有） ─────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-cluster

  # ── ALB（Public Subnet、internet-facing） ─────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue
          Fn::Sub: ${ProjectName}-public-subnet-1a-id
        - !ImportValue
          Fn::Sub: ${ProjectName}-public-subnet-1c-id
      SecurityGroups:
        - !Ref ALBSecurityGroup

  # mTLS 用 Trust Store（AlbCertificateArn 設定時のみ作成）。
  # CA バンドルは OpenApiArtifactBucket（全アプリ共有のアーティファクト用 S3 バケット）に
  # scripts/deploy-mtls.sh が事前アップロードする。TrustStore は S3 オブジェクトが存在しないと
  # 作成できないため、AlbCertificateArn が空（= CA バンドル未アップロード）の間は作成しない。
  ALBTrustStore:
    Type: AWS::ElasticLoadBalancingV2::TrustStore
    Condition: HasAlbCertificate
    Properties:
      Name: !Sub ${ProjectName}-mtls-ts
      CaCertificatesBundleS3Bucket: !Ref OpenApiArtifactBucket
      CaCertificatesBundleS3Key: mtls/root-ca-bundle.pem

  # デフォルトアクション: どのアプリの ListenerRule にもマッチしないパスは 404 を返す。
  # 各アプリの ListenerRule（path-pattern による振り分け）はアプリ別スタック側で追加する。
  # AlbCertificateArn が空の間は HTTP:80（mTLS なし）。設定されると HTTPS:443 + mTLS(Verify) に
  # 切り替わる（論理 ID・Export 名は変えず、アプリ別スタックの ListenerRule 定義は無変更で済む）。
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: !If [HasAlbCertificate, HTTPS, HTTP]
      Port: !If [HasAlbCertificate, 443, 80]
      Certificates: !If
        - HasAlbCertificate
        - - CertificateArn: !Ref AlbCertificateArn
        - !Ref AWS::NoValue
      SslPolicy: !If [HasAlbCertificate, ELBSecurityPolicy-TLS13-1-2-2021-06, !Ref AWS::NoValue]
      MutualAuthentication: !If
        - HasAlbCertificate
        - Mode: verify
          TrustStoreArn: !Ref ALBTrustStore
          IgnoreClientCertificateExpiry: false
        - !Ref AWS::NoValue
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "404"
            ContentType: application/json
            MessageBody: '{"error":"Not Found"}'

  # mTLS 有効時のみ追加する HTTP:80 -> HTTPS:443 リダイレクト専用リスナー。
  # ALBListener が 80 から 443 に移るため、80 番を未使用のまま放置しないための入口。
  ALBListenerHttpRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasAlbCertificate
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # ── NLB（Application Subnet、internal。インターネットからのアクセス不可） ──
  # 全アプリで共有する。NLB は L4 でパスベースルーティングができないため、
  # アプリごとの Listener（別ポート）とターゲットグループはアプリ別スタック側で追加する。
  NLB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-nlb
      Scheme: internal
      Type: network
      SubnetMappings:
        - SubnetId: !ImportValue
            Fn::Sub: ${ProjectName}-application-subnet-1a-id
          PrivateIPv4Address: !Ref NlbPrivateIp1a
        - SubnetId: !ImportValue
            Fn::Sub: ${ProjectName}-application-subnet-1c-id
          PrivateIPv4Address: !Ref NlbPrivateIp1c
      SecurityGroups:
        - !Ref NLBSecurityGroup

  # ── API Gateway VPC Link（NLB 全体で共有、単一） ────────────────────────────
  # NLB は VPC Endpoint Service（VpcLink の実体）を1つしか持てない制約があるため、
  # VpcLink は NLB 自体の性質（NLBArn 等と同列）としてここで一度だけ作る。
  # REST API 経由でこの NLB にアクセスしたいアプリのスタック（log-api の 07/08 等）は、
  # ここから VpcLinkId を Import して使う。
  VpcLink:
    Type: AWS::ApiGateway::VpcLink
    Properties:
      Name: !Sub ${ProjectName}-nlb-vpclink
      TargetArns:
        - !Ref NLB

Outputs:
  ALBSecurityGroupId:
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-alb-sg-id

  NLBSecurityGroupId:
    Value: !Ref NLBSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-nlb-sg-id

  ECSSecurityGroupId:
    Value: !Ref ECSSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-ecs-sg-id

  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
    Export:
      Name: !Sub ${ProjectName}-task-execution-role-arn

  ECSClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${ProjectName}-ecs-cluster-name

  ALBArn:
    Value: !Ref ALB
    Export:
      Name: !Sub ${ProjectName}-alb-arn

  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${ProjectName}-alb-dns

  # HTTP:80（mTLS 未設定時）または HTTPS:443 + mTLS(Verify)（AlbCertificateArn 設定時）の
  # どちらか。各アプリの ListenerRule はこの Export に対して追加するため、切り替わっても
  # アプリ別スタック側の変更は不要。
  ALBListenerArn:
    Value: !Ref ALBListener
    Export:
      Name: !Sub ${ProjectName}-alb-listener-arn

  NLBArn:
    Value: !Ref NLB
    Export:
      Name: !Sub ${ProjectName}-nlb-arn

  NlbPrivateIp1a:
    Value: !Ref NlbPrivateIp1a
    Export:
      Name: !Sub ${ProjectName}-nlb-private-ip-1a

  NlbPrivateIp1c:
    Value: !Ref NlbPrivateIp1c
    Export:
      Name: !Sub ${ProjectName}-nlb-private-ip-1c

  NLBDnsName:
    Value: !GetAtt NLB.DNSName
    Export:
      Name: !Sub ${ProjectName}-nlb-dns

  OpenApiBucketName:
    Value: !Ref OpenApiArtifactBucket
    Export:
      Name: !Sub ${ProjectName}-openapi-bucket-name

  VpcLinkId:
    Value: !Ref VpcLink
    Export:
      Name: !Sub ${ProjectName}-vpclink-id
